<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shery Management</title>
  <link rel="stylesheet" href="style.css" />

<body>
  <main>
    <div class="overlay">
      <div class="signup-page">
        <div class="signup-page-left">
          <form>
            <div class="profile">
              <input type="file" id="profile-pic" />
              <label for="profile-pic" class="upload-btn">Upload Profile Pic</label>
            </div>
            <div class="info">
              <label>Full Name :</label>
              <input type="text" placeholder="Enter Your Name">
            </div>

            <div class="info"><label>Email :</label>
              <input type="email" placeholder="Enter Your Email" />
            </div>

            <div class="info"> <label>Password :</label>
              <input type="password" placeholder="Enter Your Password" />
            </div>

            <div class="info"> <label>Confirm Password :</label>
              <input type="password" placeholder="Confirm Your Password" />
            </div>

            <button type="submit" class="signup-btn">Create Profile</button>
          </form>
        </div>
        <div class="signup-page-right">
        </div>
      </div>

      <div class="login-page">
        <div class="login-page-left"></div>
        <div class="login-page-right">
          <form>
            <div class="info"><label>Email :</label>
              <input type="email" placeholder="Enter Your Email" />
            </div>

            <div class="info"> <label>Password :</label>
              <input type="password" placeholder="Enter Your Password" />
            </div>

            <button type="submit" class="login-btn">Login</button>
          </form>
        </div>
      </div>

    </div>



    

    <nav>
      <img src="assets/Shery-managment-logo.png" alt="" />
      <div class="user-profile">
        <h3>How It's Works</h3>
